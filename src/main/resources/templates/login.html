<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login · iwish</title>
    <th:block th:replace="~{fragments/layout :: assets}"></th:block>
</head>
<body class="min-h-screen bg-canvas text-ink">

    <div class="mx-auto flex max-w-sm flex-col px-6 py-24">
        <a th:href="@{/}" class="mb-10 self-center"><svg th:replace="~{fragments/layout :: logo(120)}"></svg></a>

        <h1 class="text-[24px] font-semibold tracking-tight">login</h1>
        <p class="mt-1.5 mb-8 text-[15px] font-normal text-muted">다시 오신 걸 환영해요.</p>

        <!-- status -->
        <div th:if="${param.signup}" class="mb-4 rounded-control border border-line bg-mint-light px-4 py-3 text-[14px] font-medium text-mint-deep">
            회원가입이 완료됐어요. 로그인해 주세요.
        </div>
        <div th:if="${param.logout}" class="mb-4 flex items-center gap-2 rounded-control border border-mint/40 bg-mint-light px-4 py-3.5 text-[15px] font-medium text-mint-deep">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            로그아웃됐어요.
        </div>
        <div th:if="${param.error}" class="mb-4 rounded-control border border-line bg-surface px-4 py-3 text-[14px] font-medium text-danger">
            아이디 또는 비밀번호가 올바르지 않아요.
        </div>

        <!-- POST /login (CSRF auto) -->
        <form th:action="@{/login}" method="post" class="space-y-4">
            <div>
                <label for="username" class="label">아이디</label>
                <input type="text" id="username" name="username" required autofocus class="input" placeholder="아이디">
            </div>
            <div>
                <label for="password" class="label">비밀번호</label>
                <input type="password" id="password" name="password" required class="input" placeholder="비밀번호">
            </div>
            <label class="flex items-center justify-center gap-2 pt-1 text-[14px] font-medium text-muted">
                <input type="checkbox" name="remember-me" class="kk-check"> 로그인 유지
            </label>
            <button type="submit" class="btn-primary w-full py-3 text-[16px]">로그인</button>
        </form>

        <p class="mt-6 text-center text-[14px] font-normal text-muted">
            계정이 없으신가요? <a th:href="@{/signup}" class="font-medium text-mint-deep hover:underline">회원가입</a>
        </p>
        <a th:href="@{/}" class="mt-8 text-center text-[14px] font-normal text-muted hover:text-ink">← home</a>
    </div>
</body>
</html>
