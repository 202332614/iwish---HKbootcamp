<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lookbooks · iwish</title>
    <th:block th:replace="~{fragments/layout :: assets}"></th:block>
</head>
<body class="min-h-screen bg-canvas text-ink">

    <header th:replace="~{fragments/layout :: appHeader('collections')}"></header>

    <main class="mx-auto max-w-app px-6 py-10 lg:px-8 lg:py-14">
        <div class="mb-10 flex items-end justify-between border-b border-line pb-6">
            <div>
                <h1 class="text-[24px] font-semibold tracking-tight">lookbooks</h1>
                <p class="mt-2 text-[15px] font-normal text-muted">코디 아카이브</p>
            </div>
            <a th:href="@{/collections/new}" class="btn-primary-sm">+ new</a>
        </div>

        <!-- empty -->
        <div th:if="${#lists.isEmpty(collections)}" class="py-24 text-center">
            <p class="text-[17px] font-medium text-ink">아직 룩북이 없어요</p>
            <p class="mt-1.5 text-[15px] text-muted"><a th:href="@{/collections/new}" class="text-mint-deep hover:underline">첫 룩북 만들기</a></p>
        </div>

        <!-- grid -->
        <div class="grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-3">
            <a th:each="c : ${collections}" th:href="@{'/collections/' + ${c.id}}" class="pcard group card overflow-hidden">
                <div class="relative aspect-[4/5] overflow-hidden bg-[#F3F4F6]">
                    <div class="absolute inset-0 grid place-items-center">
                        <span class="text-[15px] font-normal text-muted" th:text="${c.styleTag}">mood</span>
                    </div>
                    <img th:if="${c.coverImage}" th:src="${c.coverImage}" alt="" th:alt="${c.name}"
                         class="absolute inset-0 h-full w-full object-cover transition duration-500 group-hover:scale-[1.03]" onerror="this.style.display='none'">
                    <span class="chip absolute left-3 top-3" th:text="${c.styleTag}">mood</span>
                </div>
                <div class="flex items-end justify-between p-4">
                    <div class="min-w-0">
                        <h3 class="truncate text-[17px] font-medium text-ink" th:text="${c.name}">name</h3>
                        <p class="mt-0.5 text-[14px] font-normal text-muted tnum" th:text="${c.itemCount} + '개 아이템'">0개 아이템</p>
                    </div>
                    <p class="tnum shrink-0 text-[16px] font-medium text-mint-deep">₩<span th:text="${#numbers.formatInteger(c.totalPrice, 0, 'COMMA')}">0</span></p>
                </div>
            </a>
        </div>
    </main>
</body>
</html>
