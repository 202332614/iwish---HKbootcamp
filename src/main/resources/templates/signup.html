<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up · iwish</title>
    <th:block th:replace="~{fragments/layout :: assets}"></th:block>
</head>
<body class="min-h-screen bg-canvas text-ink">

    <div class="mx-auto flex max-w-sm flex-col px-6 py-24">
        <a th:href="@{/}" class="mb-10 self-center"><svg th:replace="~{fragments/layout :: logo(120)}"></svg></a>

        <h1 class="text-[24px] font-semibold tracking-tight">create account</h1>
        <p class="mt-1.5 mb-8 text-[15px] font-normal text-muted">위시리스트를 시작해요.</p>

        <!-- POST /signup (SignupDto, CSRF auto) -->
        <form th:action="@{/signup}" th:object="${signupDto}" method="post" class="space-y-4">
            <div>
                <label for="username" class="label">아이디</label>
                <input type="text" id="username" th:field="*{username}" autofocus class="input" placeholder="3~20자">
                <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="mt-1.5 text-[13px] font-medium text-danger"></p>
            </div>
            <div>
                <label for="password" class="label">비밀번호</label>
                <input type="password" id="password" th:field="*{password}" class="input" placeholder="4자 이상">
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-1.5 text-[13px] font-medium text-danger"></p>
            </div>
            <button type="submit" class="btn-primary w-full py-3 text-[16px]">회원가입</button>
        </form>

        <p class="mt-6 text-center text-[14px] font-normal text-muted">
            이미 계정이 있으신가요? <a th:href="@{/login}" class="font-medium text-mint-deep hover:underline">로그인</a>
        </p>
        <a th:href="@{/}" class="mt-8 text-center text-[14px] font-normal text-muted hover:text-ink">← home</a>
    </div>
</body>
</html>
