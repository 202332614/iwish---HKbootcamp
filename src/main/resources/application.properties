spring.application.name=wishlist

# === 서버 포트 (PaaS는 $PORT를 주입; 없으면 8080) ===
server.port=${PORT:8080}

# === 리버스 프록시(Nginx/Cloudflare) 뒤 배포: X-Forwarded-* 인식 ===
# HTTPS 판별/리다이렉트/CSRF가 프록시 뒤에서도 올바르게 동작
server.forward-headers-strategy=native

# === MySQL ===
# 배포 시 환경변수로 덮어쓰기: SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD
# (값이 없으면 아래 로컬 기본값 사용 → 로컬 개발 그대로 동작)
# 참고: 로컬에 'wishlist' DB가 없으면 먼저 생성 필요
#   mysql -u root -p -e "CREATE DATABASE wishlist;"
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/wishlist?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:wishlist1234}

# === 문자 인코딩 (멀티파트 폼 한글 깨짐 방지) ===
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# === 파일 업로드 (이미지 썸네일) ===
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
